services:
  - type: web
    name: aegis-academics
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aegis-db
          property: connectionString

databases:
  - name: aegis-db
    plan: free
    databaseName: aegis_academics
